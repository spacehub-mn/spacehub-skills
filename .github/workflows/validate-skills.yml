name: Validate skills

on:
  pull_request:
    paths:
      - ".claude-plugin/**"
      - "plugins/**"
      - "scripts/**"
      - ".github/workflows/validate-skills.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate marketplace + plugins + skills
        run: node scripts/validate.mjs
